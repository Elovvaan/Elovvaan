version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prize_board
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build: ../backend
    env_file:
      - ../backend/.env.example
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis

  worker:
    build: ../backend
    env_file:
      - ../backend/.env.example
    command: npm run start:worker
    depends_on:
      - postgres
      - redis

  admin:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../admin:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - '3001:3001'
    depends_on:
      - backend

volumes:
  pg_data:
